<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO Optimization -->
    <title>Lovestruck Hub — Escape Into Romance</title>
    <meta name="description" content="Discover, preview, and download a curated selection of beautiful romantic novels. Querying live Gutenberg catalogs to bring you the best in contemporary, historical, fantasy, paranormal, and dark romance.">
    <meta name="keywords" content="romance novels, free romance books, romantic fiction, download romance books, pride and prejudice, jane austen, e-reader, fantasy romance, dark romance">
    <meta name="author" content="Lovestruck Hub">
    <!-- Preload critical assets -->
    <link rel="preload" href="index.css" as="style">
    <link rel="preload" href="script.js" as="script">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" as="style" crossorigin>
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="index.css">
    <!-- jsPDF for client-side PDF downloads -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <!-- Floating Romance Particles Container -->
    <div class="heart-particles" id="heartParticles"></div>

    <!-- Ambient Glowing Orbs Backdrop -->
    <div class="ambient-glows">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <!-- Application wrapper -->
    <div class="app-container">
        <!-- Header -->
        <header class="main-header glass-panel" id="appHeader">
            <a href="#" class="logo" id="logoLink" aria-label="Lovestruck Hub Home">
                <span class="logo-heart">♥</span>
                <div class="logo-text">Lovestruck<span>Hub</span></div>
            </a>
            <div class="header-actions">
                <!-- Search Box -->
                <div class="search-wrapper">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="Search by title, author, trope, genre..." aria-label="Search novels" loading="lazy">
                    <button class="search-clear-btn" id="searchClearBtn" aria-label="Clear search">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="18" y1="6" x2="6" y2="18" />
                            <line x1="6" y1="6" x2="18" y2="18" />
                        </svg>
                    </button>
                </div>
                <!-- Theme Toggle -->
                <button class="btn-icon" id="themeToggleBtn" title="Toggle Theme" aria-label="Toggle light or dark theme">
                    <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path id="sunPath" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m2.828 0l-.707-.707M17.657 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                </button>
                <!-- Bookshelf bookmarks list -->
                <button class="btn-icon" id="bookshelfOpenBtn" title="My Lovelist" aria-label="Open your reading bookmarks">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                    <span class="badge" id="libraryCountBadge">0</span>
                </button>
            </div>
        </header>

        <!-- Feature Spotlight Banner -->
        <section class="hero-spotlight glass-panel" id="heroSpotlight">
            <div class="hero-content">
                <!-- Book Cover visual -->
                <div class="hero-cover-container" id="heroCoverContainer">
                    <div class="hero-cover" id="heroCover">
                        <div class="cover-design" id="heroCoverDesign">
                            <span class="cover-badge" id="heroCoverBadge">★ Featured Romance</span>
                            <div class="cover-title" id="heroCoverTitle">Pride and Prejudice</div>
                            <div>
                                <div class="cover-author" id="heroCoverAuthor">Jane Austen</div>
                                <div class="cover-decorative-bar"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Book Text details -->
                <div class="hero-text-details">
                    <div class="hero-tagline">Love Story of the Week</div>
                    <h1 class="hero-title" id="heroTitle">Pride and Prejudice</h1>
                    <div class="hero-meta">
                        <div class="rating-stars" id="heroRatingStars">★★★★★</div>
                    </div>
                </div>
            </div>
        </section>
        <!-- More page content ... -->
    </div>
    <!-- Register Service Worker for caching & offline support -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('SW registered (scope:', reg.scope, ')'))
                    .catch(err => console.error('SW registration failed:', err));
            });
        }
    </script>
    <!-- Your main JS (if any) -->
    <script src="script.js"></script>
</body>
</html>
